name: CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v2

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar Dependencias
      run: npm install

    - name: Lint del Código
      run: npm run lint

    - name: Ejecutar Pruebas
      run: npm test

    - name: Simular Despliegue
      run: echo "Simulación de despliegue completada."